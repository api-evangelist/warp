  - name: Visibility
    description: Track Warp Oz cloud agent credit consumption monthly per workspace using the Enterprise Analytics API and team usage metrics dashboard.
  - name: Optimization
    description: Right-size plan tier to credit needs; use bring-your-own API key (BYOK) feature on Free plan to reduce platform credit spend; leverage auto-reload and spend caps on Build plan to avoid unexpected charges.
  - name: Accountability
    description: Use admin-configurable data controls (Business/Enterprise) and team-wide spend caps to allocate cloud agent costs by team or project.
  - name: Governance
    description: Enterprise plan provides advanced spend controls and dedicated account management; SAML SSO (Business/Enterprise) enables centralized identity and access governance.
