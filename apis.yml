apis:
  - aid: warp:oz-agent-api
    name: Warp Oz Agent API
    description: >-
      The Oz Agent API lets you create and monitor cloud agent runs over HTTP from any
      system without requiring the Warp desktop app. It supports creating runs, listing
      and retrieving run status, canceling runs, submitting follow-up prompts, managing
      scheduled agents, managing agent identities, and inspecting run conversations and
      artifacts. Authentication uses API keys prefixed with wk-.
    humanURL: https://docs.warp.dev/reference/api-and-sdk/
    baseURL: https://app.warp.dev/api/v1
    tags:
