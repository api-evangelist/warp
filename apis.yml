---
aid: warp
name: Warp
description: >-
  Warp is an open-source, Rust-based, GPU-accelerated agentic development environment
  built on top of a modern terminal. It combines a high-performance terminal with AI-powered
  cloud agents (the Oz platform) to help developers build, test, deploy, and debug code
  autonomously. The Oz API lets external systems trigger and monitor cloud agent runs over
  HTTP, making it suitable for CI pipelines, backend services, and internal tooling. Warp
  also provides Warp Drive for team collaboration and workflow sharing, and supports MCP
  servers for extending agent capabilities with custom tools and data sources.
